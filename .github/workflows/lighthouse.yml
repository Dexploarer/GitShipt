name: Lighthouse

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production

jobs:
  lighthouse:
    name: Lighthouse CI (mobile + desktop)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production target)
        run: bun run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@12.6.2
        with:
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          # The action starts the production server itself via `startServerCommand`
          # below; budgets in lighthouserc.json gate the job.
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
