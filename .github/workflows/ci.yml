name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Mirror .env.local defaults so static analysis steps don't blow up on a
  # missing env. Real values are never used by lint/test/typecheck/build.
  NODE_ENV: test

jobs:
  quality:
    name: typecheck • lint • theme • test • build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Theme lint
        run: bun run theme:lint

      - name: Unit + integration tests
        run: bun run test

      - name: Build
        run: bun run build

  audit:
    name: bun audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit (HIGH+ blocks; document accepted advisories explicitly)
        # Two transitive advisories are tracked upstream
        # (bigint-buffer via @bagsfm/bags-sdk, uuid via @solana/web3.js).
        # We let the job complete with informational output until upstream
        # ships fixes, then flip continue-on-error to false.
        continue-on-error: true
        run: bun audit --audit-level=high

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run e2e:install

      - name: Build (production target for stable e2e)
        run: bun run build

      - name: Run Playwright suite
        run: bun run e2e

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
